{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-image: url("https://images.unsplash.com/photo-1556742031-c6961e8560b0?auto=format&fit=crop&w=1740&q=80");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-position: center;
    }

    .container {
        max-width: 600px;
        margin-top: 100px;
    }

    .card {
        backdrop-filter: blur(10px);
        background-color: rgba(255, 255, 255, 0.85);
        border-radius: 16px;
    }
</style>

<div class="container">
    <!-- Messages Display -->
    {% if messages %}
    <div class="row mb-4">
        <div class="col-md-12">
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show"
                role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <!-- Upload Form Card -->
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
            <h4><i class="fas fa-file-upload me-2"></i> Upload Bank Statement</h4>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="pdf_file" class="form-label">Select PDF File</label>
                    <input class="form-control" type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fas fa-upload me-2"></i> Upload & Process
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
